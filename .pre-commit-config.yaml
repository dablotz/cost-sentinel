repos:
  # ----------------------------
  # General sanity checks
  # ----------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-merge-conflict
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files

  # ----------------------------
  # YAML linting (great for buildspecs)
  # ----------------------------
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        args: ["-c", ".yamllint"]

  # ----------------------------
  # Terraform formatting + validate
  # ----------------------------
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.92.0
    hooks:
      - id: terraform_fmt
      - id: terraform_validate
        args:
          - --args=-no-color
      # Optional but nice: keep README/module docs up to date
      # - id: terraform_docs

  # ----------------------------
  # Python lint/format
  # ----------------------------
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  # ----------------------------
  # Secrets detection (prevents accidental commits)
  # ----------------------------
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]

  # ----------------------------
  # Testing
  # ----------------------------
  - repo: local
    hooks:
      - id: terraform-test-sentinel
        name: terraform test (sentinel module)
        entry: bash -c 'cd infra/modules/sentinel/tests/basic && terraform test'
        language: system
        pass_filenames: false
      - id: terraform-test-sentinel-nodashboard
        name: terraform test (sentinel module no dashboard)
        entry: bash -c 'cd infra/modules/sentinel/tests/nodashboard && terraform test'
        language: system
        pass_filenames: false
