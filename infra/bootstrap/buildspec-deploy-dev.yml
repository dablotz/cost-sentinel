version: 0.2

env:
  variables:
    TF_IN_AUTOMATION: "true"

phases:
  install:
    runtime-versions:
      python: 3.11
    commands:
      - curl -sSLo /tmp/terraform.zip https://releases.hashicorp.com/terraform/1.7.5/terraform_1.7.5_linux_amd64.zip
      - unzip -o /tmp/terraform.zip -d /usr/local/bin

  build:
    commands:
      # Debug (keep for now; remove once stable)
      - echo "PWD:" && pwd
      - echo "Top-level files:" && ls -la
      - echo "Find ingestor.zip:" && find . -maxdepth 6 -name "ingestor.zip" -print

      # Locate the zip from the incoming artifact (wherever CodePipeline put it)
      - ZIP_PATH=$(find . -maxdepth 10 -name "ingestor.zip" | head -n 1)
      - test -n "$ZIP_PATH"
      - echo "Using ZIP_PATH=$ZIP_PATH"

      # Ensure the env-local dist exists and copy zip there
      - mkdir -p infra/envs/dev/dist
      - cp "$ZIP_PATH" infra/envs/dev/dist/ingestor.zip
      - ls -la infra/envs/dev/dist/ingestor.zip

      - cd infra/envs/dev

      # Create terraform.tfvars
      - |
        cat > terraform.tfvars <<EOF
        alerts_bucket_name = "${ALERTS_BUCKET_NAME_DEV}"
        lambda_zip_path    = "./dist/ingestor.zip"
        alert_email        = "${BUDGET_EMAIL}"
        monthly_budget_usd = ${MONTHLY_BUDGET_USD}
        budget_thresholds_percent = [${BUDGET_THRESHOLDS}]
        dashboard_bucket_name = "${DASHBOARD_BUCKET_NAME_DEV}"
        EOF

      # Create backend config
      - |
        cat > backend.hcl <<EOF
        bucket         = "${TF_STATE_BUCKET}"
        key            = "${TF_STATE_KEY}"
        region         = "${AWS_REGION}"
        dynamodb_table = "${TF_LOCK_TABLE}"
        EOF

      # Initialize Terraform
      - terraform init -backend-config=backend.hcl

      # Plan and apply
      - terraform plan -out=tfplan
      - terraform apply -auto-approve tfplan
      - terraform output -json > terraform-outputs.json
      - echo "=== terraform-outputs.json ==="
      - cat terraform-outputs.json

artifacts:
  files:
    - terraform-outputs.json
