version: 0.2

env:
  variables:
    TF_IN_AUTOMATION: "true"

phases:
  install:
    runtime-versions:
      python: 3.11
    commands:
      - curl -sSLo /tmp/terraform.zip https://releases.hashicorp.com/terraform/1.7.5/terraform_1.7.5_linux_amd64.zip
      - unzip -o /tmp/terraform.zip -d /usr/local/bin

  build:
    commands:
      # Locate the zip from the incoming artifact
      - ZIP_PATH=$(find . -maxdepth 10 -name "ingestor.zip" | head -n 1)
      - test -n "$ZIP_PATH"
      - echo "Found zip at: $ZIP_PATH"
      - ls -lh "$ZIP_PATH"

      # Upload to S3 artifacts bucket for reliable access
      - LAMBDA_ZIP_KEY="lambda-builds/ingestor-${CODEBUILD_BUILD_NUMBER:-latest}.zip"
      - aws s3 cp "$ZIP_PATH" "s3://${TF_STATE_BUCKET}/${LAMBDA_ZIP_KEY}"
      - echo "Uploaded to s3://${TF_STATE_BUCKET}/${LAMBDA_ZIP_KEY}"

      # Also copy to local for Terraform (as backup)
      - mkdir -p infra/envs/dev/dist
      - cp "$ZIP_PATH" infra/envs/dev/dist/ingestor.zip

      - cd infra/envs/dev
      - REPO_ROOT="$CODEBUILD_SRC_DIR"

      # Create terraform.tfvars
      - |
        cat > terraform.tfvars <<EOF
        alerts_bucket_name = "${ALERTS_BUCKET_NAME_DEV}"
        lambda_zip_path    = "./dist/ingestor.zip"
        lambda_s3_bucket   = "${TF_STATE_BUCKET}"
        lambda_s3_key      = "${LAMBDA_ZIP_KEY}"
        alert_email        = "${BUDGET_EMAIL}"
        monthly_budget_usd = ${MONTHLY_BUDGET_USD}
        budget_thresholds_percent = [${BUDGET_THRESHOLDS}]
        dashboard_bucket_name = "${DASHBOARD_BUCKET_NAME_DEV}"
        EOF

      # Create backend config
      - |
        cat > backend.hcl <<EOF
        bucket         = "${TF_STATE_BUCKET}"
        key            = "${TF_STATE_KEY}"
        region         = "${AWS_REGION}"
        dynamodb_table = "${TF_LOCK_TABLE}"
        EOF

      # Initialize Terraform
      - terraform init -backend-config=backend.hcl

      # Plan and apply
      - terraform plan -out=tfplan
      - terraform apply -auto-approve tfplan
      - terraform output -json > "$REPO_ROOT/terraform-outputs.json"
      - ls -la "$REPO_ROOT/terraform-outputs.json"

artifacts:
  files:
    - terraform-outputs.json
