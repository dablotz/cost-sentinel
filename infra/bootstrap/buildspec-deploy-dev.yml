version: 0.2

env:
  variables:
    TF_IN_AUTOMATION: "true"

phases:
  install:
    runtime-versions:
      python: 3.11
    commands:
      - curl -sSLo /tmp/terraform.zip https://releases.hashicorp.com/terraform/1.7.5/terraform_1.7.5_linux_amd64.zip
      - unzip -o /tmp/terraform.zip -d /usr/local/bin

  build:
    commands:
      - test -f dist/ingestor.zip
      - cd infra/envs/dev

      # Create terraform.tfvars
      - |
        cat > terraform.tfvars <<EOF
        alerts_bucket_name = "${ALERTS_BUCKET_NAME_DEV}"
        lambda_zip_path    = "../../dist/ingestor.zip"
        alert_email        = "${BUDGET_EMAIL}"
        monthly_budget_usd = ${MONTHLY_BUDGET_USD}
        budget_thresholds_percent = [${BUDGET_THRESHOLDS}]
        EOF

      # Create backend config
      - |
        cat > backend.hcl <<EOF
        bucket         = "${TF_STATE_BUCKET}"
        key            = "${TF_STATE_KEY}"
        region         = "${AWS_REGION}"
        dynamodb_table = "${TF_LOCK_TABLE}"
        EOF

      # Initialize Terraform
      - terraform init -backend-config=backend.hcl

      # Plan and apply
      - terraform plan -out=tfplan
      - terraform apply -auto-approve tfplan
