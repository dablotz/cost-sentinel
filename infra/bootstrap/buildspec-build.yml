version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.11
    commands:
      - curl -sSLo /tmp/terraform.zip https://releases.hashicorp.com/terraform/1.7.5/terraform_1.7.5_linux_amd64.zip
      - unzip -o /tmp/terraform.zip -d /usr/local/bin
  pre_build:
    commands:
      - terraform fmt -check -recursive
      - cd infra/envs/dev
      - terraform init -backend=false
      - terraform validate
      - cd ../../..
      - cd infra/modules/sentinel/tests/basic
      - terraform init -backend=false
      - terraform test
      - cd ../nodashboard
      - terraform init -backend=false
      - terraform test
      - cd ../../../../..
  build:
    commands:
      - mkdir -p dist
      - cd app/ingestor
      - pip install -r requirements.txt -t .
      - zip -r ../../dist/ingestor.zip . -x "*.pyc" "__pycache__/*"
      - cd ../..
      # Upload Lambda zip to S3 for reliable access
      - BUILD_ID="${CODEBUILD_BUILD_NUMBER:-$(date +%s)}"
      - aws s3 cp dist/ingestor.zip "s3://${ARTIFACT_BUCKET}/lambda-builds/ingestor-${BUILD_ID}.zip"
      - echo "Uploaded Lambda zip to s3://${ARTIFACT_BUCKET}/lambda-builds/ingestor-${BUILD_ID}.zip"
      - echo "${BUILD_ID}" > dist/build-id.txt
artifacts:
  files:
    - dist/build-id.txt
    - infra/**/*
    - scripts/**
    - web/**/*
    - app/**/*
